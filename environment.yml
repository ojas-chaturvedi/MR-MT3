name: mrmt3
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - ffmpeg
  # setuptools<81 still ships pkg_resources; seqio -> tensorflow_text ->
  # tensorflow_hub imports it (from pkg_resources import parse_version), and
  # setuptools>=81 removed it (ModuleNotFoundError: 'pkg_resources').
  - setuptools<81
  - pip<24.1
  - protobuf<=3.20.3
  - pip:
    # Pin torch to 2.1.0 (cu121) + TensorFlow 2.13: the unpinned conda pytorch
    # resolved to torch 2.12+cu130 (CUDA 13), whose CUDA libs clash with
    # TensorFlow's and segfaulted the process the moment both were imported
    # (TF is pulled in transitively via seqio/t5 in contrib/vocabularies.py).
    # This torch2.1/tf2.13 pairing is the same combination that works for the
    # MT3 model, so TF and PyTorch coexist without the segfault.
    - torch==2.1.0
    - torchaudio==2.1.0
    - tensorflow==2.13.0
    - tensorflow-text==2.13.0
    - tensorflow_probability==0.21.0
    # note_seq imports IPython (for notebook display, unused headless); IPython
    # >=8.13 needs typing_extensions.TypeAliasType (>=4.6), but the t5 stack pins
    # an older typing_extensions -> ImportError. Pin IPython below 8.13 so
    # `import note_seq` succeeds with the older typing_extensions.
    - ipython<8.13
    - transformers==4.21.3
    - librosa
    - t5
    - note-seq
    - pretty-midi
    - einops
    - numpy
    - hydra-core
    - typing_extensions
    - sentencepiece
    - pytorch_lightning
    - mir_eval
